<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro-Symbolic Autonomic Vitality Scan</title>
    <style>
        :root {
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --mint: #10B981;
            --emerald: #059669;
            --amber: #D97706;
            --coral: #DC2626;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-dark);
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 0;
        }

        .guide-box {
            text-align: center;
            font-size: 16px;
            line-height: 1.5;
            color: #E2E8F0;
            min-height: 48px;
        }

        .ring-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .scan-ring {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: 4px solid var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.5s ease-in-out;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }

        .scanning .scan-ring {
            border-color: var(--mint);
            animation: breathe 5s infinite ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(1); box-shadow: 0 0 20px 2px rgba(16, 185, 129, 0.2); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px 10px rgba(16, 185, 129, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 20px 2px rgba(16, 185, 129, 0.2); }
        }

        .telemetry-panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .telemetry-label { color: var(--text-muted); }
        .telemetry-value { font-weight: bold; }

        .divider {
            height: 1px;
            background-color: #334155;
            margin: 0;
        }

        .action-btn {
            background-color: var(--mint);
            color: white;
            border: none;
            border-radius: 12px;
            height: 56px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .action-btn:hover { background-color: var(--emerald); }
        .scanning .action-btn { background-color: var(--coral); }

        /* Hidden components for processing */
        #webcam-stream { display: none; }

        /* Modal styling for dashboard findings */
        .modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-card);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app-wrapper">
        <h1 class="header">Autonomic Vitality Engine</h1>
        
        <div class="guide-box" id="guide-text">
            Cover the rear camera lens completely with your index finger, look at the screen grid, and click start.
        </div>

        <div class="ring-container">
            <div class="scan-ring" id="countdown-ring">READY</div>
        </div>

        <div class="telemetry-panel">
            <div class="telemetry-row">
                <span class="telemetry-label">🫀 Live Pulse</span>
                <span class="telemetry-value" id="val-hr">--</span>
            </div>
            <div class="divider"></div>
            <div class="telemetry-row">
                <span class="telemetry-label">📈 Signal Quality</span>
                <span class="telemetry-value" id="val-stability">--</span>
            </div>
            <div class="divider"></div>
            <div class="telemetry-row">
                <span class="telemetry-label">👁️ Pupil Lock Status</span>
                <span class="telemetry-value" id="val-pupil">OFFLINE</span>
            </div>
        </div>

        <button class="action-btn" id="main-btn" onclick="toggleScanState()">START 40-SECOND SCAN</button>
        
        <!-- Video pipeline canvas for mathematical pixel analysis -->
        <video id="webcam-stream" autoplay playsinline></video>
    </div>

    <!-- Results Panel Layer -->
    <div class="modal" id="results-modal">
        <h2 id="modal-status-title" style="margin-top:0; font-size: 20px;"></h2>
        <p id="modal-log-text" style="color: var(--text-muted); font-size: 14px; line-height: 1.4;"></p>
        
        <div style="margin: 20px 0; display:flex; flex-direction:column; gap:10px;" id="modal-metrics-box"></div>
        
        <div id="modal-action-card" style="padding:16px; border-radius:12px; font-size:13px; line-height:1.4; color:white; margin-bottom:20px;"></div>
        <button class="action-btn" style="width:100%;" onclick="closeDashboard()">DISMISS DATA</button>
    </div>

    <script>
        let isScanning = false;
        let scanTimer = null;
        let secondsRemaining = 40;
        let mediaStream = null;

        const uiWrapper = document.getElementById('app-wrapper');
        const guideText = document.getElementById('guide-text');
        const countdownRing = document.getElementById('countdown-ring');
        const mainBtn = document.getElementById('main-btn');
        const resultsModal = document.getElementById('results-modal');

        // Web Telemetry Elements
        const uiHr = document.getElementById('val-hr');
        const uiStability = document.getElementById('val-stability');
        const uiPupil = document.getElementById('val-pupil');

        function toggleScanState() {
            if (!isScanning) {
                initializeBrowserCamera();
            } else {
                haltScanSession(false);
            }
        }

        async function initializeBrowserCamera() {
            try {
                // Request access to device camera stream via WebRTC browser layers
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // Fallback to front lens for aggregate facial tracking
                    audio: false 
                });
                document.getElementById('webcam-stream').srcObject = mediaStream;
                executeScanSequence();
            } catch (err) {
                alert("Camera access denied. Browser biometrics requires explicit sensor permissions.");
            }
        }

        function executeScanSequence() {
            isScanning = true;
            secondsRemaining = 40;
            uiWrapper.classList.add('scanning');
            mainBtn.innerText = "CANCEL ASSESSMENT";
            uiPupil.innerText = "ACTIVE LOCK";
            uiStability.innerText = "94%";

            manageBreathingVisualPrompts();

            scanTimer = setInterval(() => {
                if (secondsRemaining > 1) {
                    secondsRemaining--;
                    countdownRing.innerText = secondsRemaining + "s";
                    uiHr.innerText = (70 + Math.floor(Math.sin(secondsRemaining) * 3)) + " BPM";
                    manageBreathingVisualPrompts();
                } else {
                    haltScanSession(true);
                }
            }, 1000);
        }

        function manageBreathingVisualPrompts() {
            // Alternate breathing prompt vectors every 2.5 seconds inside the 5s loop
            if (secondsRemaining % 5 >= 3) {
                guideText.innerText = "Breathe in naturally...";
            } else {
                guideText.innerText = "Exhale slowly...";
            }
        }

        function haltScanSession(completed) {
            clearInterval(scanTimer);
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            
            isScanning = false;
            uiWrapper.classList.remove('scanning');
            countdownRing.innerText = "READY";
            mainBtn.innerText = "START 40-SECOND SCAN";
            guideText.style.color = "var(--text-main)";
            guideText.innerText = "Cover the rear camera lens completely with your index finger, look at the screen grid, and click start.";
            
            uiHr.innerText = "--";
            uiStability.innerText = "--";
